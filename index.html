<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="LC Metalúrgica"/>
<meta name="theme-color" content="#1a1a1a"/>
<title>LC Metalúrgica</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f0ece4;
    --dark:#1a1a1a;
    --card:#ffffff;
    --accent:#e8b84b;
    --green:#25D366;
    --text:#222;
    --muted:#666;
    --radius:14px;
  }
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);max-width:780px;margin:0 auto;min-height:100vh}

  .hdr{background:var(--dark);border-radius:0 0 var(--radius) var(--radius);overflow:hidden;margin-bottom:0;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .hdr-img{width:100%;height:160px;object-fit:cover;display:block;opacity:.85}
  .hdr-body{display:flex;align-items:center;gap:14px;padding:16px 18px 18px}
  .hdr-avatar{width:62px;height:62px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;flex-shrink:0;background:#333;display:flex;align-items:center;justify-content:center}
  .hdr-info h1{color:#fff;font-size:1.25rem;font-weight:800;letter-spacing:.5px}
  .hdr-info p{color:#ccc;font-size:.82rem;margin-top:3px}

  .tags{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;background:var(--dark);margin-bottom:16px}
  .tag{background:rgba(255,255,255,.12);color:#eee;border-radius:20px;padding:5px 13px;font-size:.78rem;cursor:pointer;transition:background .2s;border:none}
  .tag:hover,.tag.active{background:var(--accent);color:var(--dark);font-weight:700}

  .btn-row{display:flex;gap:10px;padding:0 16px;margin-bottom:14px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:var(--radius);font-size:.95rem;font-weight:700;text-decoration:none;cursor:pointer;border:none;transition:opacity .2s}
  .btn:active{opacity:.8}
  .btn-wpp{background:var(--green);color:#fff}
  .btn-link{background:var(--dark);color:#fff}

  .admin-box{margin:0 16px 12px;display:flex;gap:8px}
  .admin-box input{flex:1;border:1.5px solid #ccc;border-radius:var(--radius);padding:11px 14px;font-size:.9rem;background:#fff;outline:none}
  .admin-box input:focus{border-color:var(--accent)}
  .admin-box button{background:var(--dark);color:#fff;border:none;border-radius:var(--radius);padding:11px 18px;font-weight:700;cursor:pointer}

  .hint{margin:0 16px 16px;background:#fff;border-radius:var(--radius);padding:12px 16px;font-size:.83rem;color:var(--muted);display:flex;align-items:center;gap:10px;border:1px solid #e0dbd0}

  /* ADMIN PANEL */
  #admin-panel{display:none;margin:0 16px 16px;background:#fff;border-radius:var(--radius);padding:16px;border:2px solid var(--accent)}
  #admin-panel h3{font-size:1rem;margin-bottom:12px;color:var(--dark)}
  .cat-select{width:100%;padding:10px;border-radius:8px;border:1.5px solid #ccc;margin-bottom:10px;font-size:.9rem}
  .upload-area{border:2px dashed #ccc;border-radius:10px;padding:20px;text-align:center;color:var(--muted);cursor:pointer;margin-bottom:10px;transition:border-color .2s}
  .upload-area:hover{border-color:var(--accent)}
  .upload-area i{font-size:2rem;color:#ccc;margin-bottom:8px;display:block}
  .btn-upload{background:var(--accent);color:var(--dark);border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer;width:100%;font-size:.95rem}
  .upload-progress{margin-top:10px;font-size:.85rem;color:var(--muted);text-align:center;display:none}

  .section{margin-bottom:28px;padding:0 16px}
  .section-title{display:flex;align-items:center;gap:10px;font-size:1.05rem;font-weight:800;margin-bottom:14px;color:var(--dark)}
  .section-title .bar{width:4px;height:22px;background:var(--accent);border-radius:3px;flex-shrink:0}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{border-radius:12px;overflow:hidden;cursor:pointer;position:relative;background:#ddd;aspect-ratio:1/1}
  .card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .card:active img{transform:scale(1.05)}
  .card-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:.72rem;padding:5px 8px;font-family:monospace}

  .loading{text-align:center;padding:40px;color:var(--muted)}
  .loading i{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:10px;color:var(--accent)}
  @keyframes spin{to{transform:rotate(360deg)}}

  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  .modal.open{display:flex}
  .modal img{max-width:95vw;max-height:80vh;border-radius:10px;object-fit:contain}
  .modal-close{position:fixed;top:16px;right:20px;color:#fff;font-size:1.5rem;cursor:pointer;z-index:1000;background:rgba(255,255,255,.15);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none}
  .modal-actions{display:flex;gap:10px}
  .modal-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:6px}
  .modal-btn.delete{background:rgba(220,50,50,.6)}

  @media(max-width:400px){
    .hdr-info h1{font-size:1.05rem}
    .btn{font-size:.85rem;padding:11px}
  }
</style>
</head>
<body>

<div class="hdr">
  <div style="width:100%;height:160px;background:linear-gradient(135deg,#1a1a1a 0%,#333 50%,#1a1a1a 100%);display:flex;align-items:center;justify-content:center">
    <span style="color:var(--accent);font-size:3rem;opacity:.3"><i class="fa fa-industry"></i></span>
  </div>
  <div class="hdr-body">
    <div class="hdr-avatar">
      <i class="fa fa-industry" style="color:var(--accent);font-size:1.6rem"></i>
    </div>
    <div class="hdr-info">
      <h1>LC METALÚRGICA</h1>
      <p>Fabricamos Portas, Janelas, Grades, Portões e muito mais</p>
    </div>
  </div>
</div>

<div class="tags" id="tags-bar">
  <button class="tag active" onclick="filterCat('all',this)">Todos</button>
  <button class="tag" onclick="filterCat('portoes',this)">Portões</button>
  <button class="tag" onclick="filterCat('grades',this)">Grades</button>
  <button class="tag" onclick="filterCat('janelas',this)">Janelas</button>
  <button class="tag" onclick="filterCat('portas',this)">Portas</button>
  <button class="tag" onclick="filterCat('reboques',this)">Reboques</button>
  <button class="tag" onclick="filterCat('estruturas',this)">Estruturas</button>
  <button class="tag" onclick="filterCat('pecas',this)">Peças</button>
  <button class="tag" onclick="filterCat('moveis',this)">Móveis industriais</button>
  <button class="tag" onclick="filterCat('artes',this)">Artes decorativas</button>
  <button class="tag" onclick="filterCat('acrescenta',this)">Outros</button>
</div>

<div class="btn-row">
  <a class="btn btn-wpp" href="https://wa.me/5586995391880?text=Olá, vim pelo catálogo LC Metalúrgica!" target="_blank">
    <i class="fab fa-whatsapp"></i> Compartilhar
  </a>
  <a class="btn btn-link" href="https://tr.ee/xdWlJh" target="_blank">
    <i class="fa fa-link"></i> Linktree
  </a>
</div>

<div class="admin-box" id="login-box">
  <input type="password" id="admin-pw" placeholder="Senha do administrador..." onkeydown="if(event.key==='Enter')adminLogin()"/>
  <button onclick="adminLogin()">Entrar</button>
</div>

<div id="admin-panel">
  <h3>⚙️ Painel do Administrador</h3>
  <select class="cat-select" id="upload-cat">
    <option value="portoes">Portões</option>
    <option value="grades">Grades</option>
    <option value="janelas">Janelas</option>
    <option value="portas">Portas</option>
    <option value="reboques">Reboques</option>
    <option value="estruturas">Estruturas</option>
    <option value="pecas">Peças</option>
    <option value="moveis">Móveis industriais</option>
    <option value="artes">Artes decorativas</option>
    <option value="acrescenta">Outros</option>
  </select>
  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <i class="fa fa-cloud-upload-alt"></i>
    Toque para adicionar fotos
  </div>
  <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleUpload(this)"/>
  <div class="upload-progress" id="upload-progress"></div>
  <button class="btn-upload" onclick="document.getElementById('file-input').click()">+ Adicionar fotos ao catálogo</button>
</div>

<div class="hint">
  <i class="fa fa-camera" style="color:var(--accent)"></i>
  Toque na foto para ampliar. As fotos aparecem para todos os clientes!
</div>

<div id="catalog"><div class="loading"><i class="fa fa-spinner"></i>Carregando fotos...</div></div>

<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt=""/>
  <div class="modal-actions">
    <button class="modal-btn" onclick="sharePhoto()"><i class="fab fa-whatsapp"></i> Compartilhar</button>
    <button class="modal-btn delete" id="btn-delete" style="display:none" onclick="deletePhoto()"><i class="fa fa-trash"></i> Apagar</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ciesyixzhvauohlwvpxj.supabase.co";
const SUPABASE_KEY = "sb_publishable_j9cAvK1XkrGd8IBZvTNybA_cRf08wAA";
const BUCKET = "fotos";
const ADMIN_PASS = "lc2024";

const labels = {
  portoes:"Portões", grades:"Grades", janelas:"Janelas", portas:"Portas",
  reboques:"Reboques", estruturas:"Estruturas", pecas:"Peças",
  moveis:"Móveis industriais", artes:"Artes decorativas", acrescenta:"Outros"
};
const icons = {
  portoes:"fa-door-closed", grades:"fa-border-all", janelas:"fa-window-maximize",
  portas:"fa-door-open", reboques:"fa-truck", estruturas:"fa-building",
  pecas:"fa-cog", moveis:"fa-chair", artes:"fa-palette", acrescenta:"fa-images"
};

let allPhotos = {}; // { categoria: [{name, url}] }
let isAdmin = false;
let currentPhoto = null;
let currentFilter = "all";

async function listFolder(prefix) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "apikey": SUPABASE_KEY
    },
    body: JSON.stringify({ prefix: prefix + "/", limit: 200, offset: 0 })
  });
  const data = await res.json();
  return Array.isArray(data) ? data.filter(f => f.name && !f.id?.includes("placeholder")) : [];
}

function photoUrl(folder, filename) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${folder}/${filename}`;
}

async function loadAllPhotos() {
  const folders = Object.keys(labels);
  for (const folder of folders) {
    try {
      const files = await listFolder(folder);
      if (files.length > 0) {
        allPhotos[folder] = files.map(f => ({
          name: f.name,
          url: photoUrl(folder, f.name),
          folder
        }));
      }
    } catch(e) {}
  }
  renderCatalog();
}

function renderCatalog() {
  const el = document.getElementById("catalog");
  el.innerHTML = "";

  const folders = Object.keys(labels);
  let hasAny = false;

  for (const folder of folders) {
    if (currentFilter !== "all" && currentFilter !== folder) continue;
    const items = allPhotos[folder] || [];
    if (!items.length) continue;
    hasAny = true;

    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<div class="section-title">
      <span class="bar"></span>
      <i class="fa ${icons[folder]||'fa-image'}" style="color:var(--accent)"></i>
      ${labels[folder]}
    </div>
    <div class="grid">${items.map(p => `
      <div class="card" onclick="openModal('${p.url}','${p.folder}','${p.name}')">
        <img src="${p.url}" alt="${labels[folder]}" loading="lazy"/>
        <div class="card-label">${p.name.replace(/\.[^.]+$/,'')}</div>
      </div>`).join("")}
    </div>`;
    el.appendChild(sec);
  }

  if (!hasAny) {
    el.innerHTML = `<div class="loading" style="color:#999"><i class="fa fa-image" style="animation:none;color:#ccc"></i>Nenhuma foto encontrada</div>`;
  }
}

function filterCat(cat, el) {
  document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  currentFilter = cat;
  renderCatalog();
}

function openModal(url, folder, name) {
  currentPhoto = { url, folder, name };
  document.getElementById("modal-img").src = url;
  document.getElementById("btn-delete").style.display = isAdmin ? "flex" : "none";
  document.getElementById("modal").classList.add("open");
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
  currentPhoto = null;
}

function sharePhoto() {
  if (!currentPhoto) return;
  const msg = `Olá! Veja esse produto da LC Metalúrgica: ${currentPhoto.url}\n\nPara mais informações: https://wa.me/5586995391880`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
}

async function deletePhoto() {
  if (!currentPhoto || !isAdmin) return;
  if (!confirm("Apagar esta foto do catálogo?")) return;
  const path = `${currentPhoto.folder}/${currentPhoto.name}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY }
  });
  if (res.ok) {
    allPhotos[currentPhoto.folder] = allPhotos[currentPhoto.folder].filter(p => p.name !== currentPhoto.name);
    closeModal();
    renderCatalog();
  } else {
    alert("Erro ao apagar. Tente novamente.");
  }
}

function adminLogin() {
  const pw = document.getElementById("admin-pw").value;
  if (pw === ADMIN_PASS) {
    isAdmin = true;
    document.getElementById("admin-panel").style.display = "block";
    document.getElementById("login-box").style.display = "none";
  } else {
    alert("Senha incorreta!");
  }
}

async function handleUpload(input) {
  const folder = document.getElementById("upload-cat").value;
  const files = Array.from(input.files);
  const prog = document.getElementById("upload-progress");
  prog.style.display = "block";

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    prog.textContent = `Enviando ${i+1} de ${files.length}: ${file.name}...`;
    const filename = `${Date.now()}_${file.name.replace(/\s/g,"_")}`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${folder}/${filename}`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "apikey": SUPABASE_KEY,
        "Content-Type": file.type,
        "x-upsert": "true"
      },
      body: file
    });
    if (res.ok) {
      if (!allPhotos[folder]) allPhotos[folder] = [];
      allPhotos[folder].push({ name: filename, url: photoUrl(folder, filename), folder });
    }
  }

  prog.textContent = `✓ ${files.length} foto(s) adicionada(s) com sucesso!`;
  input.value = "";
  renderCatalog();
  setTimeout(() => { prog.style.display = "none"; }, 3000);
}

// Click outside modal to close
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

loadAllPhotos();
</script>
</body>
</html>
